name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers when a version tag starting with 'v' is pushed (e.g., v1.0.0)
  workflow_dispatch: # Allows manual trigger of this workflow from the GitHub UI

permissions:
  contents: write # Grants write access to repository contents to create releases

jobs:
  release:
    name: Build & Publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Use Node.js version 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application and Compile Installer
        run: npm run dist:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
